<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku WASM Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #sudoku_canvas {
            border-radius: 8px;
            box-shadow: 
                0 4px 16px 0 rgba(31, 38, 135, 0.37),
                0 0 30px rgba(100, 150, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(10, 15, 25, 0.8);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: contain;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #a0a8b0;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 0;
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }

        #error-message {
            display: none;
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            text-align: center;
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div style="position: relative; width: 100vw; height: 100vh;">
        <canvas id="sudoku_canvas" width="420" height="460"></canvas>
        <div class="loading" id="loading">Loading</div>
        <div id="error-message"></div>
    </div>

    <script type="module">
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');
        const canvas = document.getElementById('sudoku_canvas');

        function showError(message) {
            loading.style.display = 'none';
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            console.error(message);
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        async function run() {
            try {
                // Import the WASM module
                const { default: init } = await import('./sudoku.js');
                
                // Initialize the WASM module
                await init();
                
                hideLoading();
                console.log('Sudoku WASM preview loaded successfully!');
                
            } catch (err) {
                showError(`WASM load failed: ${err.message}`);
            }
        }

        // Handle canvas focus for better interaction
        canvas.addEventListener('click', () => {
            canvas.focus();
        });

        // Make canvas focusable
        canvas.tabIndex = 0;

        // Prevent context menu on canvas
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // Start the app
        run();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell Environment - Maxwell Isaacs</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../../images/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../images/favicon.png" />
    <link rel="shortcut icon" href="../../images/favicon.png" />
    <link rel="stylesheet" href="../../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Archivo:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700&family=Playfair+Display:wght@300;400;500;600;700&family=Georgia:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            .project-hero-content[style*="grid-template-columns: 1fr 1fr"] {
                grid-template-columns: 1fr !important;
                gap: 40px !important;
                padding: 80px 20px !important;
                text-align: center !important;
            }
            
           
            section[style*="padding: 80px 64px"] {
                padding: 40px 20px !important;
            }
            
            .project-content {
                padding: 40px 20px !important;
            }
            
            div[style*="position: fixed; bottom: 24px"] {
                position: fixed !important;
                bottom: 20px !important;
                left: 20px !important;
                right: 20px !important;
                transform: none !important;
                text-align: center !important;
            }
        }
    </style>
</head>
<body>
    <script>
        function goBackToPortfolio() {
            window.location.href = '../../index.html#dotfiles';
        }
    </script>
    
    <!-- Hero Section -->
    <section class="project-hero" id="project-hero" style="background: linear-gradient(135deg, #374151 0%, #1f2937 100%);">
        <div class="project-hero-content">
            <h1 class="project-hero-title" style="font-family: 'Playfair Display', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.02em;">Shell Environment</h1>
            <p class="project-hero-subtitle" style="font-family: 'Georgia', serif; font-weight: 400; line-height: 1.6; max-width: 520px; font-size: 1.15rem;">Terminal setup with custom themes, aliases, and workflow automation.</p>
            <div class="project-hero-meta" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin: 48px 0; max-width: 400px;">
                <div>
                    <span style="color: #8B7D6B; font-family: 'Georgia', serif; font-size: 0.8rem; display: block; margin-bottom: 4px; font-weight: 400;">using for</span>
                    <span style="color: #E8E3D3; font-family: 'Georgia', serif; font-size: 0.95rem; font-weight: 400;">4 years</span>
                </div>
                <div>
                    <span style="color: #8B7D6B; font-family: 'Georgia', serif; font-size: 0.8rem; display: block; margin-bottom: 4px; font-weight: 400;">stack</span>
                    <span style="color: #E8E3D3; font-family: 'Georgia', serif; font-size: 0.95rem; font-weight: 400;">fish + starship + tmux</span>
                </div>
                <div>
                    <span style="color: #8B7D6B; font-family: 'Georgia', serif; font-size: 0.8rem; display: block; margin-bottom: 4px; font-weight: 400;">type</span>
                    <span style="color: #E8E3D3; font-family: 'Georgia', serif; font-size: 0.95rem; font-weight: 400;">shell config</span>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Photo Carousel -->
    <div class="project-content" id="project-content">
        <section style="padding: 80px 64px; max-width: 1200px; margin: 0 auto;">
            <style>
                .config-carousel {
                    position: relative;
                    background: white;
                    border: 1px solid #e5e5e5;
                    border-radius: 8px;
                    margin: 0 auto;
                    max-width: 1000px;
                    height: 600px;
                    overflow: hidden;
                }
                
                .carousel-track {
                    display: flex;
                    transition: transform 0.5s ease;
                    height: 100%;
                }
                
                .carousel-slide {
                    min-width: 100%;
                    box-sizing: border-box;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    background: #fafafa;
                }
                
                .slide-image {
                    max-width: 100%;
                    max-height: 100%;
                    object-fit: contain;
                    border-radius: 4px;
                    cursor: pointer;
                    transition: transform 0.3s ease;
                }
                
                .slide-image:hover {
                    transform: scale(1.02);
                }
                
                .carousel-controls {
                    position: absolute;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    display: flex;
                    gap: 16px;
                    align-items: center;
                }
                
                .carousel-btn {
                    background: rgba(0,0,0,0.7);
                    border: none;
                    width: 40px;
                    height: 40px;
                    color: white;
                    cursor: pointer;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 18px;
                    transition: all 0.3s ease;
                }
                
                .carousel-btn:hover {
                    background: rgba(0,0,0,0.9);
                    transform: scale(1.1);
                }
                
                .carousel-indicators {
                    display: flex;
                    gap: 8px;
                }
                
                .indicator {
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    background: rgba(255,255,255,0.5);
                    cursor: pointer;
                    transition: all 0.3s ease;
                }
                
                .indicator.active {
                    background: white;
                    transform: scale(1.2);
                }
                
                .lightbox {
                    display: none;
                    position: fixed;
                    z-index: 9999;
                    left: 0;
                    top: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0,0,0,0.9);
                    backdrop-filter: blur(5px);
                }
                
                .lightbox-content {
                    position: relative;
                    width: 100%;
                    height: 100%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 40px;
                    box-sizing: border-box;
                }
                
                .lightbox-image {
                    max-width: 100%;
                    max-height: 100%;
                    object-fit: contain;
                    border-radius: 8px;
                    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
                }
                
                .lightbox-close {
                    position: absolute;
                    top: 20px;
                    right: 30px;
                    color: white;
                    font-size: 40px;
                    font-weight: bold;
                    cursor: pointer;
                    z-index: 10000;
                    width: 50px;
                    height: 50px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 50%;
                    background: rgba(0,0,0,0.5);
                    transition: all 0.3s ease;
                }
                
                .lightbox-close:hover {
                    background: rgba(0,0,0,0.8);
                    transform: scale(1.1);
                }
                
                .lightbox-nav {
                    position: absolute;
                    bottom: 30px;
                    color: white;
                    font-size: 30px;
                    font-weight: bold;
                    cursor: pointer;
                    z-index: 10000;
                    width: 60px;
                    height: 60px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 50%;
                    background: rgba(0,0,0,0.5);
                    transition: all 0.3s ease;
                    user-select: none;
                }
                
                .lightbox-nav:hover {
                    background: rgba(0,0,0,0.8);
                    transform: scale(1.1);
                }
                
                .lightbox-prev {
                    left: calc(50% - 80px);
                }
                
                .lightbox-next {
                    right: calc(50% - 80px);
                }
            </style>
            
            <div class="config-carousel">
                <div class="carousel-track" id="carousel-track">
                    <div class="carousel-slide">
                        <img src="../../images/shell-config.png" alt="Shell Configuration" class="slide-image lightbox-trigger" data-src="../../images/shell-config.png" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\'color: #666; font-family: Inter, sans-serif;\'>Screenshot: Shell Configuration</div>'">
                    </div>
                    <div class="carousel-slide">
                        <img src="../../images/shell photo.png" alt="Shell Environment" class="slide-image lightbox-trigger" data-src="../../images/shell photo.png" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\'color: #666; font-family: Inter, sans-serif;\'>Screenshot: Shell Environment</div>'">
                    </div>
                </div>
                
                <div class="carousel-controls">
                    <button class="carousel-btn" id="prev-btn">‹</button>
                    <div class="carousel-indicators" id="indicators">
                        <div class="indicator active" data-slide="0"></div>
                        <div class="indicator" data-slide="1"></div>
                    </div>
                    <button class="carousel-btn" id="next-btn">›</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <a href="#" onclick="goBackToPortfolio(); return false;" class="nav-back-item">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to Portfolio
        </a>
    </nav>

    <script>
        function setupProjectScrollAnimation() {
            const projectHero = document.getElementById('project-hero');
            const projectContent = document.getElementById('project-content');
            
            if (!projectHero || !projectContent) return;
            
            let hasScrolled = false;
            
            function handleScroll() {
                const scrollY = window.scrollY;
                const heroHeight = projectHero.offsetHeight;
                const heroTrigger = heroHeight * 0.4;
                
                if (scrollY > heroTrigger && !hasScrolled) {
                    projectHero.classList.add('scrolled');
                    projectContent.classList.add('visible');
                    hasScrolled = true;
                }
                
                if (scrollY <= 10) {
                    projectHero.classList.remove('hide-preview');
                } else {
                    projectHero.classList.add('hide-preview');
                }
            }
            
            window.addEventListener('scroll', handleScroll);
        }

        // Carousel functionality
        function setupCarousel() {
            const track = document.getElementById('carousel-track');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const indicators = document.querySelectorAll('.indicator');
            
            let currentSlide = 0;
            const totalSlides = 2;
            
            function updateCarousel() {
                const translateX = -(currentSlide * 100);
                track.style.transform = `translateX(${translateX}%)`;
                
                indicators.forEach((indicator, index) => {
                    indicator.classList.toggle('active', index === currentSlide);
                });
            }
            
            function nextSlide() {
                currentSlide = (currentSlide + 1) % totalSlides;
                updateCarousel();
            }
            
            function prevSlide() {
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
                updateCarousel();
            }
            
            function goToSlide(index) {
                currentSlide = index;
                updateCarousel();
            }
            
            nextBtn.addEventListener('click', nextSlide);
            prevBtn.addEventListener('click', prevSlide);
            
            indicators.forEach((indicator, index) => {
                indicator.addEventListener('click', () => goToSlide(index));
            });
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'ArrowRight') nextSlide();
            });
        }

        function setupLightbox() {
            const lightboxTriggers = document.querySelectorAll('.lightbox-trigger');
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxClose = document.getElementById('lightbox-close');
            const lightboxPrev = document.getElementById('lightbox-prev');
            const lightboxNext = document.getElementById('lightbox-next');
            
            const images = Array.from(lightboxTriggers).map(trigger => trigger.getAttribute('data-src'));
            let currentImageIndex = 0;
            
            function showLightboxImage(index) {
                lightboxImage.src = images[index];
                currentImageIndex = index;
                
                // Show/hide navigation arrows based on position
                lightboxPrev.style.display = index > 0 ? 'flex' : 'none';
                lightboxNext.style.display = index < images.length - 1 ? 'flex' : 'none';
            }
            
            lightboxTriggers.forEach((trigger, index) => {
                trigger.addEventListener('click', function() {
                    showLightboxImage(index);
                    lightbox.style.display = 'block';
                    document.body.style.overflow = 'hidden';
                });
            });
            
            function closeLightbox() {
                lightbox.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            
            function nextImage() {
                if (currentImageIndex < images.length - 1) {
                    showLightboxImage(currentImageIndex + 1);
                }
            }
            
            function prevImage() {
                if (currentImageIndex > 0) {
                    showLightboxImage(currentImageIndex - 1);
                }
            }
            
            lightboxClose.addEventListener('click', closeLightbox);
            lightboxNext.addEventListener('click', nextImage);
            lightboxPrev.addEventListener('click', prevImage);
            
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });
            
            document.addEventListener('keydown', function(e) {
                if (lightbox.style.display === 'block') {
                    if (e.key === 'Escape') closeLightbox();
                    if (e.key === 'ArrowRight') nextImage();
                    if (e.key === 'ArrowLeft') prevImage();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            setupProjectScrollAnimation();
            setupCarousel();
            setupLightbox();
        });
    </script>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <span id="lightbox-close" class="lightbox-close">&times;</span>
            <div id="lightbox-prev" class="lightbox-nav lightbox-prev">‹</div>
            <div id="lightbox-next" class="lightbox-nav lightbox-next">›</div>
            <img id="lightbox-image" class="lightbox-image" src="" alt="">
        </div>
    </div>

    <div class="footer-spacer"></div>
</body>
</html>

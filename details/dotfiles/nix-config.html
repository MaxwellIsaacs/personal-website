<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixOS Configuration - Maxwell Isaacs</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../../images/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../images/favicon.png" />
    <link rel="shortcut icon" href="../../images/favicon.png" />
    <link rel="stylesheet" href="../../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Archivo:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700&family=Playfair+Display:wght@300;400;500;600;700&family=Georgia:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            .project-hero-content[style*="grid-template-columns: 1fr 1fr"] {
                grid-template-columns: 1fr !important;
                gap: 40px !important;
                padding: 80px 20px !important;
                text-align: center !important;
            }
            
            
            section[style*="padding: 80px 64px"] {
                padding: 40px 20px !important;
            }
            
            .project-content {
                padding: 40px 20px !important;
            }
            
            div[style*="position: fixed; bottom: 24px"] {
                position: fixed !important;
                bottom: 20px !important;
                left: 20px !important;
                right: 20px !important;
                transform: none !important;
                text-align: center !important;
            }
        }
    </style>
</head>
<body>
    <script>
        function goBackToPortfolio() {
            window.location.href = '../../index.html#dotfiles';
        }
    </script>
    
    <!-- Hero Section -->
    <section class="project-hero" id="project-hero" style="background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);">
        <div class="project-hero-content">
            <h1 class="project-hero-title" style="font-family: 'Playfair Display', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.02em;">NixOS Configuration</h1>
            <p class="project-hero-subtitle" style="font-family: 'Georgia', serif; font-weight: 400; line-height: 1.6; max-width: 520px; font-size: 1.15rem;">Declarative system configuration with reproducible builds and atomic upgrades.</p>
            <div class="project-hero-meta" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin: 48px 0; max-width: 400px;">
                <div>
                    <span style="color: #C4B8A3; font-family: 'Georgia', serif; font-size: 0.8rem; display: block; margin-bottom: 4px; font-weight: 400;">using for</span>
                    <span style="color: #E8E3D3; font-family: 'Georgia', serif; font-size: 0.95rem; font-weight: 400;">1 year</span>
                </div>
                <div>
                    <span style="color: #C4B8A3; font-family: 'Georgia', serif; font-size: 0.8rem; display: block; margin-bottom: 4px; font-weight: 400;">language</span>
                    <span style="color: #E8E3D3; font-family: 'Georgia', serif; font-size: 0.95rem; font-weight: 400;">nix</span>
                </div>
                <div>
                    <span style="color: #C4B8A3; font-family: 'Georgia', serif; font-size: 0.8rem; display: block; margin-bottom: 4px; font-weight: 400;">type</span>
                    <span style="color: #E8E3D3; font-family: 'Georgia', serif; font-size: 0.95rem; font-weight: 400;">system config</span>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Main Content -->
    <div class="project-content" id="project-content">
        <section style="padding: 80px 64px; max-width: 800px; margin: 0 auto; text-align: center;">
            <p style="font-family: 'Georgia', serif; font-size: 1.1rem; line-height: 1.7; color: #444; margin-bottom: 64px;">my personal config</p>
            
            <a href="https://github.com/MaxwellIsaacs/dotfiles" target="_blank" rel="noopener noreferrer" style="display: inline-block; border: 1px solid #ccc; color: #333; padding: 12px 24px; text-decoration: none; font-family: 'Georgia', serif; font-size: 0.9rem; transition: all 0.2s ease;" onmouseover="this.style.borderColor='#888'; this.style.color='#000'" onmouseout="this.style.borderColor='#ccc'; this.style.color='#333'">
                view on github
            </a>
        </section>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <a href="#" onclick="goBackToPortfolio(); return false;" class="nav-back-item">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to Portfolio
        </a>
    </nav>

    <script>
        function setupProjectScrollAnimation() {
            const projectHero = document.getElementById('project-hero');
            const projectContent = document.getElementById('project-content');
            
            if (!projectHero || !projectContent) return;
            
            let hasScrolled = false;
            
            function handleScroll() {
                const scrollY = window.scrollY;
                const heroHeight = projectHero.offsetHeight;
                const heroTrigger = heroHeight * 0.4;
                
                if (scrollY > heroTrigger && !hasScrolled) {
                    projectHero.classList.add('scrolled');
                    projectContent.classList.add('visible');
                    hasScrolled = true;
                }
                
                if (scrollY <= 10) {
                    projectHero.classList.remove('hide-preview');
                } else {
                    projectHero.classList.add('hide-preview');
                }
            }
            
            window.addEventListener('scroll', handleScroll);
        }

        document.addEventListener('DOMContentLoaded', setupProjectScrollAnimation);
    </script>

    <div class="footer-spacer"></div>
</body>
</html>

<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="300" height="200" fill="#1B1B2F"/>
  
  <!-- Network nodes -->
  <circle cx="60" cy="60" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  <circle cx="150" cy="40" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  <circle cx="240" cy="60" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  <circle cx="200" cy="120" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  <circle cx="80" cy="160" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  <circle cx="220" cy="160" r="8" fill="#40407a" stroke="#fff" stroke-width="2"/>
  
  <!-- Connections -->
  <line x1="60" y1="60" x2="150" y2="40" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="150" y1="40" x2="240" y2="60" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="60" y1="60" x2="100" y2="100" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="100" y1="100" x2="200" y2="120" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="240" y1="60" x2="200" y2="120" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="100" y1="100" x2="80" y2="160" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="200" y1="120" x2="220" y2="160" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  <line x1="80" y1="160" x2="220" y2="160" stroke="#40407a" stroke-width="2" opacity="0.8"/>
  
  <!-- Title text -->
  <text x="150" y="190" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">P2P Network</text>
</svg>